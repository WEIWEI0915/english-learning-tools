<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Singsing · 英语启蒙互动学习</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Comic Sans MS','Segoe UI','Microsoft YaHei',sans-serif;min-height:100vh;padding:16px;background:linear-gradient(135deg,#0F9ED5 0%,#156082 50%,#A02B93 100%);position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(circle at 15% 20%,rgba(255,255,255,0.12) 0%,transparent 35%),radial-gradient(circle at 85% 60%,rgba(255,255,255,0.10) 0%,transparent 30%),radial-gradient(circle at 50% 85%,rgba(255,200,50,0.10) 0%,transparent 28%),radial-gradient(circle at 30% 50%,rgba(100,200,255,0.10) 0%,transparent 32%)}
.cloud{position:fixed;pointer-events:none;z-index:0;background:rgba(255,255,255,0.06);border-radius:50%;animation:fc 22s ease-in-out infinite}
@keyframes fc{0%{transform:translateX(0) scale(1);opacity:0}8%{opacity:.4}88%{opacity:.4}100%{transform:translateX(115vw) scale(1.08);opacity:0}}

.header{text-align:center;padding:20px 0 10px;position:relative}
.header h1{font-size:28px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.25)}
.header .sub{color:rgba(255,255,255,.85);font-size:13px;margin-top:4px;letter-spacing:2px}

.tabs-wrap{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;position:relative}
.tab{padding:6px 13px;border:none;border-radius:16px;font-size:12px;cursor:pointer;background:rgba(255,255,255,.85);color:#555;box-shadow:0 2px 6px rgba(0,0,0,.08);transition:all .12s;white-space:nowrap}
.tab:hover{transform:translateY(-1px);background:#fff}
.tab.active{background:#FFB347;color:#fff;font-weight:bold;box-shadow:0 3px 10px rgba(255,179,71,.4)}
.tab.game-tab{background:rgba(255,224,178,.9);font-weight:600}
.tab.game-tab.active{background:#e67e22;color:#fff}
.tab.plan-tab{background:rgba(200,230,255,.9);font-weight:600}
.tab.plan-tab.active{background:#156082;color:#fff}

.panel{display:none;background:rgba(255,255,255,.88);border-radius:16px;padding:18px;max-width:960px;margin:0 auto;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 8px 36px rgba(0,0,0,.12);border:1px solid rgba(255,255,255,.35);position:relative}
.panel.active{display:block}
.panel h2{font-size:16px;color:#2c3e50;margin-bottom:8px;padding-bottom:6px;border-bottom:3px solid #FFB347}
.panel h3{font-size:14px;color:#555;margin:8px 0 4px}
.ppt-ref{display:inline-block;font-size:11px;color:#fff;background:#156082;padding:2px 10px;border-radius:10px;margin:2px 4px}
.ppt-ref.vocab{background:#0F9ED5}
.ppt-ref.dialogue{background:#4EA72E}
.ppt-ref.grammar{background:#A02B93}
.ppt-ref.cards{background:#E97132}

.items{display:flex;flex-wrap:wrap;gap:5px}
.item{padding:6px 14px;background:#fff;border:2px solid #e0e0e0;border-radius:10px;cursor:pointer;font-size:14px;transition:all .08s;user-select:none}
.item:active{transform:scale(.92)}
.item.word{background:#fef9e7;border-color:#f9e79f}
.item.sentence{background:#e8f8f5;border-color:#a3e4d7;width:100%}
.item .zh{font-size:12px;color:#999;margin-left:6px}
.item.playing{background:#ffe0b2!important;border-color:#e67e22!important}
.item.correct{background:#c8e6c9!important;border-color:#4caf50!important;pointer-events:none}
.item.wrong{background:#ffcdd2!important;border-color:#f44336!important;animation:shake .3s}

.sub-tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.sub-tab{padding:5px 12px;border:1px solid #ddd;border-radius:12px;font-size:12px;cursor:pointer;background:#fff;color:#777;transition:all .1s}
.sub-tab.active{background:#FFB347;color:#fff;border-color:#FFB347;font-weight:600}
.sub-section{display:none}
.sub-section.active{display:block}

.game-area{text-align:center;padding:8px 0}
.game-score{display:flex;gap:14px;justify-content:center;margin-bottom:10px;font-size:14px;color:#555;flex-wrap:wrap}
.game-score span{background:#fff;padding:4px 12px;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.game-score .sn{color:#e67e22;font-weight:bold;font-size:18px}
.game-score .cn{color:#e74c3c;font-weight:bold;font-size:18px}
.game-options{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0}
.game-options .item{min-width:110px;padding:10px 20px;font-size:15px}
.game-progress{height:6px;background:#e0e0e0;border-radius:3px;margin:8px 0;overflow:hidden}
.game-progress-bar{height:100%;background:linear-gradient(90deg,#FFB347,#e67e22);border-radius:3px;transition:width .4s}
.game-play-btn{padding:10px 30px;font-size:15px;border:none;border-radius:22px;cursor:pointer;background:linear-gradient(135deg,#FFB347,#e67e22);color:#fff;font-weight:bold;box-shadow:0 3px 10px rgba(230,126,34,.3);transition:all .15s}
.game-play-btn:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(230,126,34,.4)}
.game-play-btn:active{transform:scale(.96)}
.game-result{font-size:18px;font-weight:bold;margin:8px 0;min-height:30px}
.game-result.ok{color:#4caf50}
.game-result.fail{color:#f44336}
.game-finish{text-align:center;padding:16px}
.game-finish h3{font-size:20px;color:#e67e22;margin-bottom:6px}
.game-finish .stars{font-size:36px}
.game-finish p{color:#666;margin:3px 0}

.match-area{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.match-col{flex:1;min-width:150px;max-width:280px}
.match-col h3{text-align:center;font-size:13px;color:#555;margin-bottom:4px}
.match-card{padding:8px 14px;margin:3px 0;background:#fff;border:2px solid #ddd;border-radius:10px;cursor:pointer;text-align:center;font-size:14px;transition:all .1s;user-select:none}
.match-card:hover{border-color:#FFB347;transform:translateX(2px)}
.match-card.selected{border-color:#e67e22;background:#fff3e0;transform:scale(1.03)}
.match-card.matched{border-color:#4caf50;background:#e8f5e9;pointer-events:none;opacity:.7}
.match-card.wrong-flash{animation:shake .3s}

.daily-card{background:linear-gradient(135deg,#fff8e1,#fff3e0);border-radius:14px;padding:18px;text-align:center;border:2px solid #ffe0b2}
.daily-card .en{font-size:22px;color:#2c3e50;margin:8px 0}
.daily-card .zh{font-size:15px;color:#888}
.daily-card .tip{font-size:12px;color:#999;margin-top:8px;padding:6px;background:rgba(255,255,255,.6);border-radius:8px}
.daily-nav{display:flex;gap:8px;justify-content:center;margin-top:10px}
.daily-nav button{padding:5px 18px;border:none;border-radius:14px;background:#fff;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.06);font-size:13px}

.plan-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.plan-table th{background:#156082;color:#fff;padding:8px 6px;text-align:center;font-size:12px}
.plan-table td{padding:7px 6px;text-align:center;border-bottom:1px solid #eee;background:#fff}
.plan-table tr:nth-child(even) td{background:#f8f8f8}
.plan-table .unit-tag{display:inline-block;padding:2px 8px;border-radius:10px;color:#fff;font-size:11px;font-weight:bold}
.step-flow{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.step{background:#fff;padding:4px 10px;border-radius:10px;font-size:11px;color:#555;border:1px solid #ddd}
.step b{color:#e67e22}

.vlink{display:inline-block;padding:8px 20px;background:linear-gradient(135deg,#0F9ED5,#156082);color:#fff;border-radius:20px;text-decoration:none;font-size:13px;margin:6px 4px;box-shadow:0 2px 8px rgba(15,158,213,.3);transition:all .15s}
.vlink:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(15,158,213,.4)}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.cf-piece{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;animation:cf-fall 1.2s ease-out forwards;z-index:999}
@keyframes cf-fall{0%{opacity:1;transform:translateY(0) rotate(0) scale(1)}100%{opacity:0;transform:translateY(500px) rotate(720deg) scale(.3)}}
@keyframes pop-in{0%{transform:scale(0);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
.pop-in{animation:pop-in .35s ease-out}

@media(max-width:600px){
body{padding:8px}.panel{padding:10px}.item{font-size:12px;padding:5px 10px}
.match-area{flex-direction:column;align-items:center}.match-col{max-width:100%;width:100%}
.plan-table{font-size:10px}.plan-table th,.plan-table td{padding:4px 2px}
}
</style>
</head>

<script>

const UNITS = [
{ id:'unit1', icon:'👋', en:'Greetings', zh:'问候', color:'#156082', bv:'BV1L4411h77Q',

  vocab:[['hello','你好'],['goodbye','再见'],['morning','早晨'],['afternoon','下午'],['evening','傍晚'],['night','晚上'],['friend','朋友'],['name','名字'],['nice','好的'],['meet','遇见'],['thank you','谢谢'],['welcome','欢迎']],

{ id:'unit2', icon:'🎨', en:'Colors & Shapes', zh:'颜色与形状', color:'#E97132', bv:'BV1hvD2BkEDh',

  vocab:[['red','红色'],['blue','蓝色'],['yellow','黄色'],['green','绿色'],['orange','橙色'],['purple','紫色'],['pink','粉色'],['white','白色'],['black','黑色'],['circle','圆形'],['square','正方形'],['triangle','三角形']],
  dialogue:[['A','What color is it?','这是什么颜色？'],['B',"It's red!",'这是红色！'],['A','What color do you like?','你喜欢什么颜色？'],['B','I like blue. What about you?','我喜欢蓝色。你呢？'],['A',"I like yellow. It's sunny!",'我喜欢黄色。像阳光一样！'],['B',"Look! A rainbow!",'看！彩虹！']],

  dialogue:[['A','What time is it?','几点了？'],['B',"It's 8 o'clock. Time for breakfast!",'8点了。该吃早饭了！'],['A','What time is it now?','现在几点了？'],['B',"It's 12 o'clock. Time for lunch!",'12点了。该吃午饭了！'],['A',"I'm hungry! Let's eat!",'我饿了！我们吃饭吧！']],

{ id:'unit5', icon:'👨‍👩‍👧‍👦', en:'Family', zh:'家人', color:'#0F9ED5', bv:'BV1aJ411d7Xm',

let actx=null;
function blip(){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();const o=actx.createOscillator(),g=actx.createGain();o.frequency.value=880;g.gain.setValueAtTime(.06,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.03);o.connect(g).connect(actx.destination);o.start(actx.currentTime);o.stop(actx.currentTime+.03)}catch(_){}}
let utter=null,engVoice=null;
try{utter=new SpeechSynthesisUtterance('');utter.lang='en-US';utter.rate=.95}catch(_){}
function pv(){if(!utter||engVoice)return!!engVoice;try{const vs=speechSynthesis.getVoices();if(!vs.length)return!1;engVoice=vs.find(v=>/zira|jenny|hazel|susan|samantha/i.test(v.name))||vs.find(v=>v.name.includes('Microsoft')&&v.lang.startsWith('en'))||vs.find(v=>v.lang.startsWith('en'))||vs[0];if(engVoice)utter.voice=engVoice;return!!engVoice}catch(_){return!0}}
let wt=0;function wu(){if(!utter||pv()||wt++>30)return;setTimeout(wu,100)}
try{speechSynthesis.onvoiceschanged=()=>{pv()}}catch(_){};wu();setTimeout(()=>{pv()},2000);
function speak(text,el){if(!text)return;if(el)el.classList.add('playing');blip();if(utter){try{utter.text=text;if(engVoice)utter.voice=engVoice;utter.onend=()=>{if(el)el.classList.remove('playing')};if(!speechSynthesis.speaking)speechSynthesis.speak(utter)}catch(_){if(el)el.classList.remove('playing')}}}

function confetti(n=25){const c=['#f44336','#e91e63','#9c27b0','#3f51b5','#03a9f4','#4caf50','#ffeb3b','#ff9800','#e67e22'];for(let i=0;i<n;i++){const e=document.createElement('div');e.className='cf-piece';e.style.left=Math.random()*100+'vw';e.style.top='-10px';e.style.background=c[Math.floor(Math.random()*c.length)];e.style.width=(5+Math.random()*7)+'px';e.style.height=(5+Math.random()*7)+'px';e.style.animationDuration=(.7+Math.random()*.8)+'s';e.style.animationDelay=(Math.random()*.3)+'s';document.body.appendChild(e);setTimeout(()=>e.remove(),2000)}}

let listenState={pool:[],current:0,score:0,combo:0,maxCombo:0,total:0,correct:0};
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startListen(){const pool=shuffle(ALL_VOCAB).slice(0,10);listenState={pool,current:0,score:0,combo:0,maxCombo:0,total:10,correct:0};renderListen();setTimeout(()=>playListenWord(),400)}
function renderListen(){
  const p=document.getElementById('panel-listen');const s=listenState;
  if(!s.pool.length){startListen();return}
  if(s.current>=s.pool.length){
    const stars=s.correct<4?'⭐':s.correct<7?'⭐⭐':s.correct<9?'⭐⭐⭐':'⭐⭐⭐⭐⭐';
    p.innerHTML='<div class="game-finish pop-in"><h3>闯关完成!</h3><div class="stars">'+stars+'</div><p>答对 '+s.correct+'/'+s.total+'  最高连击 '+s.maxCombo+'</p><p>得分: '+s.score+'</p><br><button class="game-play-btn" onclick="startListen()">再来一局</button></div>';
    if(s.correct>=7)confetti(35);return;
  }
  const cur=s.pool[s.current];let opts=[cur];let pool=ALL_VOCAB.filter(v=>v.en!==cur.en);pool=shuffle(pool);
  for(let i=0;i<pool.length&&opts.length<4;i++){if(!opts.find(o=>o.zh===pool[i].zh))opts.push(pool[i])}
  while(opts.length<4&&pool.length){const extra=pool[opts.length%pool.length];if(!opts.includes(extra))opts.push(extra);else break}
  opts=shuffle(opts);const pct=(s.current/s.total*100).toFixed(0);
  p.innerHTML='<div class="game-area"><div style="font-size:12px;color:#999;margin-bottom:4px">📎 覆盖PPT全部10个单元的词汇（共'+ALL_VOCAB.length+'个词）</div>'
    +'<div class="game-score"><span>得分 <span class="sn">'+s.score+'</span></span><span>连击 <span class="cn">'+s.combo+'</span>x</span><span>'+(s.current+1)+'/'+s.total+'</span></div>'
    +'<div class="game-progress"><div class="game-progress-bar" style="width:'+pct+'%"></div></div>'
    +'<div style="margin:8px 0"><button class="game-play-btn" onclick="playListenWord()">🔊 听发音</button></div>'
    +'<div class="game-result" id="listenResult"></div>'
    +'<div class="game-options" id="listenOpts">'+opts.map(o=>'<div class="item word" onclick="checkListen(\''+o.en+'\',this)">'+o.zh+'</div>').join('')+'</div></div>';
  listenState._cur=cur.en;
}
function playListenWord(){if(listenState.pool[listenState.current])speak(listenState.pool[listenState.current].en)}
function checkListen(chosen,el){
  const s=listenState;const correct=s.pool[s.current].en;const r=document.getElementById('listenResult');const opts=document.getElementById('listenOpts');
  if(!opts)return;opts.querySelectorAll('.item').forEach(e=>e.style.pointerEvents='none');
  if(chosen===correct){s.combo++;s.correct++;if(s.combo>s.maxCombo)s.maxCombo=s.combo;const bonus=Math.min(s.combo,5);s.score+=10+bonus*2;r.className='game-result ok';r.textContent='✅ 正确! '+(bonus>1?'连击 x'+s.combo+' (+'+(bonus*2)+')':'');el.classList.add('correct');if(s.combo>=3)confetti(12)}
  else{s.combo=0;r.className='game-result fail';r.textContent='❌ 答案是: '+correct+' ('+s.pool[s.current].zh+')';el.classList.add('wrong');opts.querySelectorAll('.item').forEach(e=>{if(e.textContent.trim()===s.pool[s.current].zh)e.classList.add('correct')})}
  s.current++;setTimeout(renderListen,1000)
}

let matchState={left:[],right:[],selected:null,pairs:0,tries:0,total:6};
function startMatch(){const pool=shuffle(ALL_VOCAB).slice(0,6);const left=pool.map(v=>({id:v.en,text:v.en,pair:v.en}));const right=pool.map(v=>({id:v.en+'_zh',text:v.zh,pair:v.en}));matchState={left:shuffle(left),right:shuffle(right),selected:null,pairs:0,tries:0,total:6};renderMatch()}
function renderMatch(){
  const p=document.getElementById('panel-match');const s=matchState;
  if(s.pairs>=s.total){const stars=s.tries<=s.total+2?'⭐⭐⭐⭐⭐':s.tries<=s.total+4?'⭐⭐⭐':'⭐';p.innerHTML='<div class="game-finish pop-in"><h3>全部配对!</h3><div class="stars">'+stars+'</div><p>配对 '+s.total+' 对，尝试 '+s.tries+' 次</p><p>准确率 '+(s.total/s.tries*100).toFixed(0)+'%</p><br><button class="game-play-btn" onclick="startMatch()">再来一局</button></div>';if(s.tries<=s.total+3)confetti(25);return}
  p.innerHTML='<h2>单词配对 — 点击英文，再点击对应中文</h2><div class="game-score"><span>已完成 <span class="sn">'+s.pairs+'/'+s.total+'</span></span><span>尝试 <span class="cn">'+s.tries+'</span></span></div><div class="match-area"><div class="match-col"><h3>English</h3>'+s.left.map(c=>'<div class="match-card'+(c.matched?' matched':'')+(s.selected&&s.selected.id===c.id?' selected':'')+'" onclick="clickMatch(\''+c.id+'\',\'left\',this)">'+c.text+'</div>').join('')+'</div><div class="match-col"><h3>中文</h3>'+s.right.map(c=>'<div class="match-card'+(c.matched?' matched':'')+(s.selected&&s.selected.id===c.id?' selected':'')+'" onclick="clickMatch(\''+c.id+'\',\'right\',this)">'+c.text+'</div>').join('')+'</div></div>'
}
function clickMatch(id,side,el){const s=matchState;const item=side==='left'?s.left.find(x=>x.id===id):s.right.find(x=>x.id===id);if(!item||item.matched)return;if(side==='left')speak(item.text);if(!s.selected){s.selected={id,side,item,el};renderMatch();return}const first=s.selected;s.selected=null;s.tries++;if(first.item.pair===item.pair&&first.side!==side){first.item.matched=true;item.matched=true;s.pairs++;confetti(8);speak(item.pair);renderMatch()}else{el.classList.add('wrong-flash');if(first.el)first.el.classList.add('wrong-flash');setTimeout(()=>{if(first.el)first.el.classList.remove('wrong-flash');el.classList.remove('wrong-flash');renderMatch()},500)}}

// ════════════════════════════════════════════
//  Tab switching
// ════════════════════════════════════════════
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const panel=document.getElementById('panel-'+name);
  if(panel)panel.classList.add('active');
  if(name==='plan')buildPlan();
  if(name.startsWith('unit')){const u=UNITS.find(x=>x.id===name);if(u)buildUnitPanel(u)}
  if(name==='listen'&&!listenState.pool.length)startListen();
  if(name==='match'&&!matchState.total)startMatch();
  if(name==='daily')renderDaily()
}
function switchSubTab(unitId,section){
  activeSubTab[unitId]=section;
  document.querySelectorAll('#panel-'+unitId+' .sub-tab').forEach(t=>{t.classList.toggle('active',t.textContent.includes(section==='vocab'?'核心词汇':section==='dialogue'?'场景对话':section==='grammar'?'语法要点':'词卡扩展'))});
  document.querySelectorAll('#panel-'+unitId+' .sub-section').forEach(s=>s.classList.remove('active'));
  const sec=document.getElementById('sub-'+unitId+'-'+section);
  if(sec)sec.classList.add('active')
}
document.getElementById('tabBar').addEventListener('click',e=>{const tab=e.target.closest('.tab');if(tab)switchTab(tab.dataset.tab)});

// Init
buildUnitPanel(UNITS[0]);
