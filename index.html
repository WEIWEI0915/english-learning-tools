* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  min-height: 100vh; padding: 16px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  position: relative; overflow-x: hidden;
}
/* 动态泡泡背景 */
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.10) 0%, transparent 35%),
    radial-gradient(circle at 40% 80%, rgba(255,200,50,0.12) 0%, transparent 30%),
    radial-gradient(circle at 70% 20%, rgba(100,200,255,0.12) 0%, transparent 35%);
}
/* 浮动装饰圆 */
body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(2px 2px at 10% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(3px 3px at 25% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(2px 2px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(4px 4px at 75% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(2px 2px at 90% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(3px 3px at 15% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 90%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(3px 3px at 85% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(2px 2px at 45% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(3px 3px at 35% 25%, rgba(255,200,50,0.3) 0%, transparent 100%);
}
/* 浮动云朵 */
.floating-cloud {
  position: fixed; pointer-events: none; z-index: 0;
  background: rgba(255,255,255,0.08); border-radius: 50%;
  animation: float-cloud 20s ease-in-out infinite;
}
.floating-cloud:nth-child(1) { width: 200px; height: 60px; top: 8%; left: -100px; animation-duration: 25s; }
.floating-cloud:nth-child(2) { width: 150px; height: 45px; top: 25%; left: -80px; animation-duration: 30s; animation-delay: -8s; }
.floating-cloud:nth-child(3) { width: 180px; height: 55px; top: 55%; left: -120px; animation-duration: 22s; animation-delay: -15s; }
.floating-cloud:nth-child(4) { width: 120px; height: 35px; top: 75%; left: -60px; animation-duration: 28s; animation-delay: -5s; }
.floating-cloud:nth-child(5) { width: 160px; height: 50px; top: 40%; left: -90px; animation-duration: 26s; animation-delay: -12s; }
@keyframes float-cloud {
  0% { transform: translateX(0) scale(1); opacity: 0; }
  5% { opacity: 0.5; }
  90% { opacity: 0.5; }
  100% { transform: translateX(120vw) scale(1.1); opacity: 0; }

.tab.game-tab { background: #ffe0b2; }

.game-play-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 16px rgba(230,126,34,0.4); }

.match-area { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
.match-col { flex: 1; min-width: 180px; max-width: 300px; }

.match-card {

.match-card.selected { border-color: #e67e22; background: #fff3e0; transform: scale(1.03); }

/* ─── 庆祝粒子 ─── */
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
.confetti-piece {
  position: fixed; width: 10px; height: 10px; border-radius: 2px; pointer-events: none;

@keyframes confetti-fall {

  100% { opacity: 0; transform: translateY(500px) rotate(720deg) scale(0.3); }

@keyframes pop-in {
  0% { transform: scale(0); opacity: 0; }

  100% { transform: scale(1); opacity: 1; }

<script>
// 兼容垫片：部分国产浏览器不支持 Object.values
if (!Object.values) Object.values = o => Object.keys(o).map(k => o[k]);

// ════════════════════════════════════════════
//  基础引擎：嘀声 + TTS
// ════════════════════════════════════════════

let actx = null;
function blip() {
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    const osc = actx.createOscillator();
    const g = actx.createGain();
    osc.frequency.value = 880;
    g.gain.setValueAtTime(0.08, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.03);
    osc.connect(g).connect(actx.destination);
    osc.start(actx.currentTime);
    osc.stop(actx.currentTime + 0.03);
  } catch(_) {}
}

// 语音合成（部分移动端浏览器不支持，必须兜底防崩）
let engVoice = null;
let speechReady = false;

function pollVoices() {
  if (engVoice) return true;
  try {
    const vs = speechSynthesis.getVoices();
    if (!vs.length) return false;
    engVoice = vs.find(v => /zira|jenny|hazel|susan|tingting|sinji/i.test(v.name))
            || vs.find(v => v.lang.startsWith('en'))
            || vs[0];
    speechReady = true;
    return !!engVoice;
  } catch(_) { speechReady = true; return true; }
}
let warmTries = 0;
function warmup() {
  if (pollVoices() || warmTries++ > 30) return;
  setTimeout(warmup, 100);
}
try {
  speechSynthesis.onvoiceschanged = () => { pollVoices(); };
  // 安卓预热：空朗读一次唤醒 TTS 引擎
  const d = new SpeechSynthesisUtterance(''); speechSynthesis.speak(d); speechSynthesis.cancel();
} catch(_) {}
warmup();
setTimeout(() => { pollVoices(); }, 2000);

function speak(text, el) {
  if (!text) return;
  if (el) el.classList.add('playing');
  blip();
  try {
    speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'en-US'; msg.rate = 0.95;
    if (engVoice) msg.voice = engVoice;
    msg.onend = () => { if (el) el.classList.remove('playing'); };
    speechSynthesis.resume();
    speechSynthesis.speak(msg);
  } catch(_) { if (el) el.classList.remove('playing'); }
}

// ════════════════════════════════════════════
//  庆祝效果
// ════════════════════════════════════════════

function confetti(count = 30) {
  const colors = ['#f44336','#e91e63','#9c27b0','#3f51b5','#03a9f4','#4caf50','#ffeb3b','#ff9800','#e67e22'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-10px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (0.8 + Math.random() * 0.8) + 's';
    el.style.animationDelay = (Math.random() * 0.3) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

function buildPhonetics() {

// ════════════════════════════════════════════
//  听力闯关
// ════════════════════════════════════════════

let listenState = { pool: [], current: 0, score: 0, combo: 0, maxCombo: 0, total: 0, correct: 0 };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startListen() {
  // 从词汇中抽 10 题
  const shuffled = shuffle(ALL_VOCAB);
  listenState = {
    pool: shuffled.slice(0, 10),
    current: 0, score: 0, combo: 0, maxCombo: 0, total: 10, correct: 0
  };
  renderListen();
  // 自动读第一个词
  setTimeout(() => { playListenWord(); }, 300);
}

function renderListen() {
  const p = document.getElementById('panel-listen');
  const s = listenState;
  if (!s.pool.length) { startListen(); return; }
  if (s.current >= s.pool.length) {
    // 完成
    const stars = s.correct < 4 ? '⭐' : s.correct < 7 ? '⭐⭐' : s.correct < 9 ? '⭐⭐⭐' : '⭐⭐⭐⭐⭐';
    p.innerHTML = '<div class="game-finish pop-in"><h3>闯关完成!</h3>'
      + '<div class="stars">' + stars + '</div>'
      + '<p>答对 ' + s.correct + '/' + s.total + '  最高连击 ' + s.maxCombo + '</p>'
      + '<p>得分: ' + s.score + '</p>'
      + '<br><button class="game-play-btn" onclick="startListen()">再来一局</button></div>';
    if (s.correct >= 7) confetti(40);
    return;
  }
  const cur = s.pool[s.current];
  // 生成选项：正确答案 + 3 个干扰项（去重中文释义）
  let opts = [cur];
  // 取所有 en/zh 都与正确答案不同的词作为干扰池
  let pool = ALL_VOCAB.filter(v => v.en !== cur.en);
  // 打乱后取前 3 个 zh 不同的（避免 hello/hi 同时显示"你好"）
  pool = shuffle(pool);
  let added = 0;
  for (let i = 0; i < pool.length && added < 3; i++) {
    if (pool[i].zh !== cur.zh || pool[i].en === cur.en) continue;
    opts.push(pool[i]);
    added++;
  }
  // 实在不够 3 个干扰项才允许同 zh
  for (let i = 0; i < pool.length && added < 3; i++) {
    if (opts.includes(pool[i])) continue;
    opts.push(pool[i]);
    added++;
  }
  opts = shuffle(opts);

  // 进度
  const pct = (s.current / s.total * 100).toFixed(0);
  p.innerHTML = '<div class="game-area">'
    + '<div class="game-score">'
      + '<span>得分 <span class="score-num">' + s.score + '</span></span>'
      + '<span>连击 <span class="combo-num">' + s.combo + '</span>x</span>'
      + '<span>' + (s.current + 1) + '/' + s.total + '</span>'
    + '</div>'
    + '<div style="font-size:12px;color:#999;margin-bottom:4px">📎 覆盖课件 Part 1-5 全部词汇</div>'
    + '<div class="game-progress"><div class="game-progress-bar" style="width:' + pct + '%"></div></div>'
    + '<div style="margin:10px 0"><button class="game-play-btn" onclick="playListenWord()">听发音</button></div>'
    + '<div class="game-result" id="listenResult"></div>'
    + '<div class="game-options" id="listenOpts">'
    + opts.map(o => '<div class="item word" onclick="checkListen(\'' + o.en + '\',this)">' + o.zh + '</div>').join('')
    + '</div></div>';
  listenState._currentWord = cur.en;
}

function playListenWord() {
  if (listenState.pool[listenState.current]) {
    speak(listenState.pool[listenState.current].en);
  }
}

function checkListen(chosen, el) {
  const s = listenState;
  const correct = s.pool[s.current].en;
  const r = document.getElementById('listenResult');
  const opts = document.getElementById('listenOpts');
  if (!opts) return;
  // 禁用所有选项
  opts.querySelectorAll('.item').forEach(el2 => el2.style.pointerEvents = 'none');

  if (chosen === correct) {
    s.combo++; s.correct++;
    if (s.combo > s.maxCombo) s.maxCombo = s.combo;
    const bonus = Math.min(s.combo, 5);
    s.score += 10 + bonus * 2;
    r.className = 'game-result ok';
    r.textContent = '正确! ' + (bonus > 1 ? '连击 x' + s.combo + ' (+' + (bonus*2) + ')' : '');
    el.classList.add('correct');
    if (s.combo >= 3) confetti(15);
  } else {
    s.combo = 0;
    r.className = 'game-result fail';
    r.textContent = '答案是: ' + correct + ' (' + s.pool[s.current].zh + ')';
    el.classList.add('wrong');
    // 标出正确项
    opts.querySelectorAll('.item').forEach(el2 => {
      if (el2.textContent.trim() === s.pool[s.current].zh) el2.classList.add('correct');
    });
  }
  s.current++;
  setTimeout(renderListen, 1200);
}

// ════════════════════════════════════════════
//  单词配对
// ════════════════════════════════════════════

let matchState = { left: [], right: [], selected: null, pairs: 0, tries: 0, score: 0 };

function startMatch() {
  // 随机抽 6 对
  const shuffled = [...ALL_VOCAB].sort(() => Math.random() - 0.5).slice(0, 6);
  const left = shuffled.map(v => ({ id: v.en, text: v.en, pair: v.en }));
  const right = shuffled.map(v => ({ id: v.en + '_zh', text: v.zh, pair: v.en }));
  right.sort(() => Math.random() - 0.5);
  matchState = { left: shuffle(left), right: shuffle(right), selected: null, pairs: 0, tries: 0, score: 0, total: 6 };
  renderMatch();
}

function shuffle(arr) { const a = [...arr]; for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random() * (i+1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

function renderMatch() {
  const p = document.getElementById('panel-match');
  const s = matchState;
  if (s.pairs >= s.total) {
    const stars = s.tries <= s.total + 2 ? '⭐⭐⭐⭐⭐' : s.tries <= s.total + 4 ? '⭐⭐⭐' : '⭐';
    p.innerHTML = '<div class="game-finish pop-in"><h3>全部配对!</h3>'
      + '<div class="stars">' + stars + '</div>'
      + '<p>配对 ' + s.total + ' 对，尝试 ' + s.tries + ' 次</p>'
      + '<p>准确率 ' + (s.total / s.tries * 100).toFixed(0) + '%</p>'
      + '<br><button class="game-play-btn" onclick="startMatch()">再来一局</button></div>';
    if (s.tries <= s.total + 3) confetti(30);
    return;
  }
  p.innerHTML = '<h2>单词配对 — 点击英文，再点击对应中文</h2>'
    + '<div class="game-score"><span>已完成 <span class="score-num">' + s.pairs + '/' + s.total + '</span></span><span>尝试 <span class="combo-num">' + s.tries + '</span></span></div>'
    + '<div class="match-area">'
    + '<div class="match-col"><h3>English</h3>' + s.left.map(c => '<div class="match-card' + (c.matched ? ' matched' : '') + (s.selected && s.selected.id === c.id ? ' selected' : '') + '" onclick="clickMatch(\'' + c.id + '\',\'left\',this)">' + c.text + '</div>').join('') + '</div>'
    + '<div class="match-col"><h3>中文</h3>' + s.right.map(c => '<div class="match-card' + (c.matched ? ' matched' : '') + (s.selected && s.selected.id === c.id ? ' selected' : '') + '" onclick="clickMatch(\'' + c.id + '\',\'right\',this)">' + c.text + '</div>').join('') + '</div>'
    + '</div>';
}

function clickMatch(id, side, el) {
  const s = matchState;
  // 已配对的不能选
  const item = side === 'left' ? s.left.find(x => x.id === id) : s.right.find(x => x.id === id);
  if (!item || item.matched) return;
  // 发音
  if (side === 'left') speak(item.text);

  if (!s.selected) {
    // 第一次选
    s.selected = { id, side, item, el };
    renderMatch();
    return;
  }
  // 第二次选
  const first = s.selected;
  s.selected = null;
  s.tries++;

  // 配对检测：两个项的 pair (en) 必须相同，且各来自一边
  if (first.item.pair === item.pair && first.side !== side) {
    first.item.matched = true;
    item.matched = true;
    s.pairs++;
    confetti(10);
    speak(item.pair);
    renderMatch();
  } else {
    // 错误
    el.classList.add('wrong-flash');
    if (first.el) first.el.classList.add('wrong-flash');
    setTimeout(() => {
      if (first.el) first.el.classList.remove('wrong-flash');
      el.classList.remove('wrong-flash');
      renderMatch();
    }, 500);
  }
}

// ════════════════════════════════════════════
//  切换选项卡
// ════════════════════════════════════════════

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  // 游戏面板懒启动
  if (name === 'listen' && !listenState.pool.length) startListen();
  if (name === 'match' && !matchState.total) startMatch();
  if (name === 'daily') renderDaily();
}

// 绑定点击事件到 tab 按钮
document.getElementById('tabBar').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (tab) switchTab(tab.dataset.tab);
});
